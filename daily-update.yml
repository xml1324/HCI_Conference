name: 학회 정보 자동 업데이트

on:
  schedule:
    - cron: '0 15 * * 1,4'  # 월·목 자정 KST (UTC 15:00) — API 비용 $0
  workflow_dispatch:          # 수동 실행

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml

      - name: 학회 정보 업데이트
        run: python update_conferences.py

      - name: 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "변경 없음 — 스킵"
          else
            git commit -m "🤖 학회 정보 업데이트 ($(date +'%Y-%m-%d'))"
            git push
          fi
