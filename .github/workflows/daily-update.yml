name: 매일 학회 정보 자동 업데이트

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 한국 시간 자정 (UTC 15:00) 실행
  workflow_dispatch:         # 수동 실행 버튼도 제공

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # index.html 커밋에 필요

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install anthropic

      - name: 학회 정보 업데이트 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_conferences.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "변경된 내용 없음 — 커밋 생략"
          else
            git commit -m "🤖 학회 정보 자동 업데이트 ($(date +'%Y-%m-%d'))"
            git push
          fi
